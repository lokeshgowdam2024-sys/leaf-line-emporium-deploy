kind = "web"
previewPath = "/"
title = "LEAFLINE - Premium Plant Store"
version = "1.0.0"
id = "artifacts/leafline"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23658

[services.development]
run = "pnpm --filter @workspace/leafline run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/leafline", "run", "build" ]
publicDir = "artifacts/leafline/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23658"
BASE_PATH = "/"
