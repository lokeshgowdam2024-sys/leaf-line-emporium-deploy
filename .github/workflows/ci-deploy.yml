name: CI - build, migrate, seed, deploy frontend

on:
  push:
    branches: [ main ]

jobs:
  build-and-migrate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install pnpm
        run: npm i -g pnpm

      - name: Install
        run: pnpm install

      - name: Run DB migrations (drizzle push)
        if: env.DATABASE_URL != ''
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          pnpm --filter @workspace/db run push

      - name: Seed plants
        if: env.DATABASE_URL != ''
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          pnpm --filter @workspace/scripts run seed:plants

  deploy-frontend:
    needs: build-and-migrate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
      - name: Install pnpm
        run: npm i -g pnpm
      - name: Install
        run: pnpm install

      # Build the frontend
      - name: Build frontend
        run: |
          cd artifacts/leafline
          pnpm install
          pnpm run build

      # Optional: deploy to Vercel using Vercel Action - requires VERCEL_TOKEN, VERCEL_ORG_ID and VERCEL_PROJECT_ID set in repository secrets
      - name: Deploy to Vercel (optional)
        if: ${{ secrets.VERCEL_TOKEN != '' }}
        uses: amondnet/vercel-action@v20
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: artifacts/leafline
          prod: true
