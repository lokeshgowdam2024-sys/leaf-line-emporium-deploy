openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: LEAFLINE Plant Store API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: plants
    description: Plant catalog operations
  - name: auth
    description: Authentication operations
  - name: cart
    description: Cart operations
  - name: orders
    description: Order operations
  - name: donations
    description: Donation operations
  - name: wishlist
    description: Wishlist operations
  - name: openai
    description: OpenAI AI chat operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /plants:
    get:
      operationId: listPlants
      tags: [plants]
      summary: List plants with optional filtering
      parameters:
        - name: category
          in: query
          schema: { type: string }
        - name: difficulty
          in: query
          schema: { type: string }
        - name: petSafe
          in: query
          schema: { type: boolean }
        - name: lowLight
          in: query
          schema: { type: boolean }
        - name: airPurifier
          in: query
          schema: { type: boolean }
        - name: indoor
          in: query
          schema: { type: boolean }
        - name: search
          in: query
          schema: { type: string }
        - name: sortBy
          in: query
          schema:
            type: string
            enum: [price_asc, price_desc, name, popularity, difficulty]
        - name: minPrice
          in: query
          schema: { type: number }
        - name: maxPrice
          in: query
          schema: { type: number }
      responses:
        "200":
          description: List of plants
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Plant"
  /plants/{id}:
    get:
      operationId: getPlant
      tags: [plants]
      summary: Get a plant by ID
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Plant
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Plant"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/register:
    post:
      operationId: register
      tags: [auth]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterBody"
      responses:
        "201":
          description: Registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginBody"
      responses:
        "200":
          description: Logged in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /cart:
    get:
      operationId: getCart
      tags: [cart]
      summary: Get cart items
      responses:
        "200":
          description: Cart items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CartItem"
    delete:
      operationId: clearCart
      tags: [cart]
      summary: Clear the cart
      responses:
        "204":
          description: Cart cleared
  /cart/items:
    post:
      operationId: addToCart
      tags: [cart]
      summary: Add item to cart
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddToCartBody"
      responses:
        "200":
          description: Cart item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CartItem"
  /cart/items/{plantId}:
    put:
      operationId: updateCartItem
      tags: [cart]
      summary: Update cart item quantity
      parameters:
        - name: plantId
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCartBody"
      responses:
        "200":
          description: Updated cart item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CartItem"
    delete:
      operationId: removeFromCart
      tags: [cart]
      summary: Remove item from cart
      parameters:
        - name: plantId
          in: path
          required: true
          schema: { type: integer }
      responses:
        "204":
          description: Removed

  /orders:
    get:
      operationId: listOrders
      tags: [orders]
      summary: List user orders
      responses:
        "200":
          description: Orders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Order"
    post:
      operationId: createOrder
      tags: [orders]
      summary: Create an order from current cart
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOrderBody"
      responses:
        "201":
          description: Created order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
  /orders/{id}:
    get:
      operationId: getOrder
      tags: [orders]
      summary: Get an order by ID
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"

  /donations:
    get:
      operationId: listDonations
      tags: [donations]
      summary: List user donations
      responses:
        "200":
          description: Donations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Donation"
    post:
      operationId: createDonation
      tags: [donations]
      summary: Create a donation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDonationBody"
      responses:
        "201":
          description: Donation created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Donation"
  /donations/{id}:
    get:
      operationId: getDonation
      tags: [donations]
      summary: Get donation by ID
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Donation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Donation"

  /wishlist:
    get:
      operationId: getWishlist
      tags: [wishlist]
      summary: Get wishlist
      responses:
        "200":
          description: Wishlist plant IDs
          content:
            application/json:
              schema:
                type: array
                items:
                  type: integer
    post:
      operationId: addToWishlist
      tags: [wishlist]
      summary: Add plant to wishlist
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WishlistBody"
      responses:
        "200":
          description: Added
  /wishlist/{plantId}:
    delete:
      operationId: removeFromWishlist
      tags: [wishlist]
      summary: Remove plant from wishlist
      parameters:
        - name: plantId
          in: path
          required: true
          schema: { type: integer }
      responses:
        "204":
          description: Removed

  /openai/conversations:
    get:
      operationId: listOpenaiConversations
      tags: [openai]
      summary: List all conversations
      responses:
        "200":
          description: List of conversations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OpenaiConversation"
    post:
      operationId: createOpenaiConversation
      tags: [openai]
      summary: Create a new conversation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOpenaiConversationBody"
      responses:
        "201":
          description: Created conversation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenaiConversation"
  /openai/conversations/{id}:
    get:
      operationId: getOpenaiConversation
      tags: [openai]
      summary: Get conversation with messages
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Conversation with messages
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenaiConversationWithMessages"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenaiError"
    delete:
      operationId: deleteOpenaiConversation
      tags: [openai]
      summary: Delete a conversation
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "204":
          description: Deleted
  /openai/conversations/{id}/messages:
    get:
      operationId: listOpenaiMessages
      tags: [openai]
      summary: List messages in a conversation
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: List of messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OpenaiMessage"
    post:
      operationId: sendOpenaiMessage
      tags: [openai]
      summary: Send a text message and receive a streaming text response
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendOpenaiMessageBody"
      responses:
        "200":
          description: SSE stream
          content:
            text/event-stream: {}

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    ErrorResponse:
      type: object
      properties:
        message:
          type: string
      required: [message]

    Plant:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        scientificName:
          type: string
        price:
          type: number
        originalPrice:
          type: number
          nullable: true
        category:
          type: string
        difficulty:
          type: string
        lightRequirement:
          type: string
        wateringFrequency:
          type: string
        petSafe:
          type: boolean
        airPurificationRating:
          type: integer
        indoor:
          type: boolean
        description:
          type: string
        careInstructions:
          type: string
        recommendedPlacement:
          type: string
        growthSpeed:
          type: string
        humidityRequirement:
          type: string
        emoji:
          type: string
        gradient:
          type: string
        badge:
          type: string
          nullable: true
        popularity:
          type: integer
      required:
        - id
        - name
        - scientificName
        - price
        - category
        - difficulty
        - lightRequirement
        - wateringFrequency
        - petSafe
        - airPurificationRating
        - indoor
        - description
        - careInstructions
        - recommendedPlacement
        - growthSpeed
        - humidityRequirement
        - emoji
        - gradient
        - popularity

    User:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        createdAt:
          type: string
          format: date-time
      required: [id, name, email, createdAt]

    RegisterBody:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
        password:
          type: string
      required: [name, email, password]

    LoginBody:
      type: object
      properties:
        email:
          type: string
        password:
          type: string
      required: [email, password]

    AuthResponse:
      type: object
      properties:
        token:
          type: string
        user:
          $ref: "#/components/schemas/User"
      required: [token, user]

    CartItem:
      type: object
      properties:
        id:
          type: integer
        plantId:
          type: integer
        quantity:
          type: integer
        plant:
          $ref: "#/components/schemas/Plant"
      required: [id, plantId, quantity, plant]

    AddToCartBody:
      type: object
      properties:
        plantId:
          type: integer
        quantity:
          type: integer
      required: [plantId, quantity]

    UpdateCartBody:
      type: object
      properties:
        quantity:
          type: integer
      required: [quantity]

    Order:
      type: object
      properties:
        id:
          type: integer
        status:
          type: string
        totalAmount:
          type: number
        shippingName:
          type: string
        shippingAddress:
          type: string
        shippingCity:
          type: string
        shippingZip:
          type: string
        items:
          type: array
          items:
            $ref: "#/components/schemas/OrderItem"
        createdAt:
          type: string
          format: date-time
      required: [id, status, totalAmount, shippingName, shippingAddress, shippingCity, shippingZip, items, createdAt]

    OrderItem:
      type: object
      properties:
        id:
          type: integer
        plantId:
          type: integer
        plantName:
          type: string
        quantity:
          type: integer
        price:
          type: number
      required: [id, plantId, plantName, quantity, price]

    CreateOrderBody:
      type: object
      properties:
        shippingName:
          type: string
        shippingAddress:
          type: string
        shippingCity:
          type: string
        shippingZip:
          type: string
        paymentMethod:
          type: string
      required: [shippingName, shippingAddress, shippingCity, shippingZip, paymentMethod]

    Donation:
      type: object
      properties:
        id:
          type: integer
        plantId:
          type: integer
        plantName:
          type: string
        donorName:
          type: string
        location:
          type: string
        certificateId:
          type: string
        amount:
          type: number
        createdAt:
          type: string
          format: date-time
      required: [id, plantId, plantName, donorName, location, certificateId, amount, createdAt]

    CreateDonationBody:
      type: object
      properties:
        plantId:
          type: integer
        location:
          type: string
        donorName:
          type: string
      required: [plantId, location, donorName]

    WishlistBody:
      type: object
      properties:
        plantId:
          type: integer
      required: [plantId]

    OpenaiConversation:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required: [id, title, createdAt, updatedAt]

    OpenaiConversationWithMessages:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        messages:
          type: array
          items:
            $ref: "#/components/schemas/OpenaiMessage"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required: [id, title, messages, createdAt, updatedAt]

    OpenaiMessage:
      type: object
      properties:
        id:
          type: integer
        role:
          type: string
          enum: [user, assistant, system]
        content:
          type: string
        createdAt:
          type: string
          format: date-time
      required: [id, role, content, createdAt]

    CreateOpenaiConversationBody:
      type: object
      properties:
        title:
          type: string
      required: [title]

    SendOpenaiMessageBody:
      type: object
      properties:
        content:
          type: string
      required: [content]

    OpenaiError:
      type: object
      properties:
        message:
          type: string
      required: [message]
